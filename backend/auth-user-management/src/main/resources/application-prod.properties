spring.application.name=auth-user-management
server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

ufb.jwt.secret=${UFB_JWT_SECRET}
ufb.jwt.access-exp-ms=${JWT_ACCESS_EXP_MS:900000}
ufb.jwt.refresh-exp-ms=${JWT_REFRESH_EXP_MS:604800000}

ufb.admin.email=${UFB_ADMIN_EMAIL:cedrickngabo03@gmail.com}
ufb.admin.full-name=${UFB_ADMIN_FULL_NAME:Cedrick Ngabo}
ufb.admin.claim-token-expiry-hours=24

ufb.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

ufb.password-reset.expiry-hours=1
ufb.verification.expiry-hours=24
ufb.two-factor.expiry-minutes=10

spring.mail.host=${MAIL_HOST:mail.ufbconsulting.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:info@ufbconsulting.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
ufb.mail.from=${MAIL_FROM:info@ufbconsulting.com}

spring.rabbitmq.addresses=${RABBITMQ_URL}

ufb.aws.region=${AWS_REGION:eu-north-1}
ufb.aws.access-key=${AWS_ACCESS_KEY_ID:}
ufb.aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
ufb.aws.s3.bucket=${AWS_S3_BUCKET:ufb-ufb}
ufb.aws.s3.presign-hours=168

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
