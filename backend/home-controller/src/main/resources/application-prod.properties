spring.application.name=home-controller
server.port=${PORT:8084}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

ufb.jwt.secret=${UFB_JWT_SECRET}

spring.rabbitmq.addresses=${RABBITMQ_URL}
spring.rabbitmq.publisher-confirm-type=correlated

ufb.aws.region=${AWS_REGION:eu-north-1}
ufb.aws.access-key=${AWS_ACCESS_KEY_ID:}
ufb.aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
ufb.aws.s3.bucket=${AWS_S3_BUCKET:ufb-ufb}
ufb.aws.s3.presign-hours=168
ufb.aws.cdn-base-url=${CDN_BASE_URL:}

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
