spring.application.name=notification-service
server.port=${PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

ufb.jwt.secret=${UFB_JWT_SECRET}

spring.rabbitmq.addresses=${RABBITMQ_URL}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=8
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2

spring.mail.host=${MAIL_HOST:mail.ufbconsulting.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:info@ufbconsulting.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
ufb.mail.from=${MAIL_FROM:info@ufbconsulting.com}

ufb.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
ufb.notification.public-base-url=${NOTIFICATION_PUBLIC_URL:http://localhost:8083}
ufb.notification.unsubscribe-secret=${UNSUBSCRIBE_SECRET:change-this-unsubscribe-signing-secret-please}
ufb.notification.scheduler.tick-ms=60000
